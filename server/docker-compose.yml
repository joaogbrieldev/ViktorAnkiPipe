services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      libretranslate:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data

  libretranslate:
    image: libretranslate/libretranslate
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5000/languages || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  sqlite_data:
