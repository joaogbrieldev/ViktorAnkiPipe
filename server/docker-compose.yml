services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      libretranslate:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data
    command: sh -c "alembic -c /app/alembic.ini upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"

  libretranslate:
    image: libretranslate/libretranslate
    ports:
      - "5001:5000"
    environment:
      LT_LOAD_ONLY: en,pt
    volumes:
      - libretranslate_data:/home/libretranslate/.local
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:5000/languages || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  sqlite_data:
  libretranslate_data:
